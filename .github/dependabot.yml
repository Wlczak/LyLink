version: 2
updates:
    - package-ecosystem: "composer"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "friday"
          time: "08:00"
      cooldown:
          default-days: 60
          semver-major-days: 60
          semver-minor-days: 30
          semver-patch-days: 21

    - package-ecosystem: "npm"
      directory: "/javascript/"
      schedule:
          interval: "weekly"
          day: "friday"
          time: "08:00"
      cooldown:
          default-days: 60
          semver-major-days: 60
          semver-minor-days: 30
          semver-patch-days: 21
